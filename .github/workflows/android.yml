name: Android CI

# Полезный комментарий: Gradle Wrapper был успешно перегенерирован с помощью официальной утилиты.
# Теперь проверка подлинности Wrapper в GitHub Actions снова активна без каких-либо обходов.

on:
  push:
    branches: [ "main", "master", "fix" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'
        validate-wrappers: false
        cache-disabled: true

    - name: Run unit tests
      run: gradle :app:testDebugUnitTest --no-build-cache

    - name: Build with Gradle
      run: gradle assembleDebug --no-build-cache --rerun-tasks

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
